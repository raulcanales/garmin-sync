services:
  garmin-sync:
    image: 10.0.0.60:5001/garmin-sync:latest
    container_name: garmin-sync
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /mnt/user/appdata/garmin-sync:/data
    environment:
      GARMIN_USER_1_EMAIL: ${GARMIN_USER_1_EMAIL}
      GARMIN_USER_1_PASSWORD: ${GARMIN_USER_1_PASSWORD}
      GARMIN_USER_2_EMAIL: ${GARMIN_USER_2_EMAIL}
      GARMIN_USER_2_PASSWORD: ${GARMIN_USER_2_PASSWORD}
      GARMIN_TOKEN_CACHE_PATH: /data/garmin_tokens
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - proxynet

networks:
  proxynet:
    external: true