services:
  garmin-sync:
    image: 10.0.0.60:5001/garmin-sync:latest
    container_name: garmin-sync
    restart: unless-stopped
    ports:
      # Host 8080 is often Immich; garmin-sync listens on 8081
      - "8081:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - proxynet

networks:
  proxynet:
    external: true
