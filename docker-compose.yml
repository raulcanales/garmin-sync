services:
  postgres:
    profiles: [local]
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: garmin
      POSTGRES_PASSWORD: garmin
      POSTGRES_DB: garmin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garmin -d garmin"]
      interval: 5s
      timeout: 5s
      retries: 5

  garmin-sync:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://garmin:garmin@postgres:5432/garmin}
    depends_on:
      postgres:
        condition: service_healthy
        required: false

volumes:
  postgres_data:
