services:
  postgres:
    profiles: [local]
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: garmin
      POSTGRES_PASSWORD: garmin
      POSTGRES_DB: garmin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garmin -d garmin"]
      interval: 5s
      timeout: 5s
      retries: 5

  garmin-sync:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${GARMIN_DATA_DIR:-./data}:/data
    environment:
      GARMIN_EMAIL: ${GARMIN_EMAIL:-}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD:-}
      GARMIN_USER_1_EMAIL: ${GARMIN_USER_1_EMAIL:-}
      GARMIN_USER_1_PASSWORD: ${GARMIN_USER_1_PASSWORD:-}
      GARMIN_USER_2_EMAIL: ${GARMIN_USER_2_EMAIL:-}
      GARMIN_USER_2_PASSWORD: ${GARMIN_USER_2_PASSWORD:-}
      GARMIN_USER_1_ID: ${GARMIN_USER_1_ID:-user1}
      GARMIN_USER_2_ID: ${GARMIN_USER_2_ID:-user2}
      GARMIN_TOKEN_CACHE_PATH: /data/garmin_tokens
      DATABASE_URL: ${DATABASE_URL:-postgresql://garmin:garmin@postgres:5432/garmin}
    depends_on:
      postgres:
        condition: service_healthy
        required: false

volumes:
  postgres_data:
